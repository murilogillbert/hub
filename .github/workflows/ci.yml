name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Restore backend
        run: dotnet restore backend/OpenDriverHub.slnx

      - name: Build backend
        run: dotnet build backend/OpenDriverHub.slnx --no-restore

      - name: Test backend
        run: dotnet test backend/OpenDriverHub.slnx --no-build --verbosity normal

      - name: Install frontend
        run: npm ci

      - name: Build frontend
        run: npm run build
