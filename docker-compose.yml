services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: opendriverhub-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_PASSWORD:-Strong_Local_Pwd_123!}
      MSSQL_PID: Express
    ports:
      - "${SQLSERVER_PORT:-1435}:1433"
    volumes:
      - opendriverhub-mssql:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  opendriverhub-mssql:
